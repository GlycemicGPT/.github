name: "Bug Report"
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before Submitting

        - Search existing issues to check if this has already been reported.
        - If this is a security vulnerability, please report it privately via our [Security Policy](https://github.com/GlycemicGPT/.github/blob/main/SECURITY.md).

  - type: input
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      placeholder: "e.g., web dashboard, API, mobile app, watch face"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Navigate to '...'
        2. Click on '...'
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you running?
      placeholder: "e.g., 0.1.100 or dev-latest"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant logs.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, configuration details, or any other relevant information.
